<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Collab Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 270px;
      background: #fff;
      color: #111;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 15px 11px;
      background: #fafafa;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; background: #4f6ef7; }

    h1 { font-size: 13px; font-weight: 600; }

    .v { margin-left: auto; font-size: 10px; color: #bbb; }

    .section {
      padding: 13px 15px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .label {
      font-size: 10px;
      font-weight: 500;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 8px;
    }

    .row { display: flex; gap: 8px; align-items: center; }

    input[type="text"] {
      flex: 1;
      height: 32px;
      padding: 0 10px;
      font-size: 12px;
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 8px;
      background: #f5f5f5;
      color: #111;
      outline: none;
      font-family: inherit;
    }

    input[type="text"]:focus {
      border-color: #4f6ef7;
      background: white;
      box-shadow: 0 0 0 2px rgba(79,110,247,0.14);
    }

    .btn-primary {
      padding: 0 13px;
      height: 32px;
      font-size: 12px;
      font-weight: 500;
      background: #4f6ef7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity 0.13s;
    }

    .btn-primary:hover { opacity: 0.87; }

    .saved { font-size: 11px; color: #16a34a; margin-top: 5px; display: none; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #16a34a;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      background: #f7f7f7;
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .stat-label { font-size: 10px; color: #bbb; margin-bottom: 2px; }
    .stat-val   { font-size: 22px; font-weight: 600; color: #111; }

    .actions {
      padding: 10px 15px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .btn-action {
      all: unset;
      width: 100%;
      padding: 8px 11px;
      font-size: 12px;
      font-family: inherit;
      background: white;
      color: #333;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.12s;
    }

    .btn-action:hover { background: #f5f5f5; }

    .btn-action.danger { color: #dc2626; border-color: rgba(220,38,38,0.18); }
    .btn-action.danger:hover { background: #fef2f2; }
  </style>
</head>
<body>

  <div class="header">
    <div class="dot"></div>
    <h1>Collab Chat</h1>
    <span class="v">v1.0</span>
  </div>

  <div class="section">
    <div class="label">Your name</div>
    <div class="row">
      <input type="text" id="name-input" placeholder="Display name…" />
      <button class="btn-primary" id="save-btn">Save</button>
    </div>
    <div class="saved" id="saved-msg">✓ Saved</div>
  </div>

  <div class="section">
    <div class="label">Status</div>
    <div class="status-row">
      <div class="status-dot"></div>
      Active on all pages
    </div>
  </div>

  <div class="section">
    <div class="label">This session</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Messages</div>
        <div class="stat-val" id="s-msgs">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Tasks found</div>
        <div class="stat-val" id="s-tasks">0</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-action" id="toggle-btn">
      <span>👁</span> Show / hide widget
    </button>
    <button class="btn-action danger" id="clear-btn">
      <span>🗑</span> Clear all data
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
